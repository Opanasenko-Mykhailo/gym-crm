openapi: 3.0.3
info:
  title: GCA API
  description: API for managing trainees, trainers, their profiles, and training schedules
  version: '1.0'

servers:
  - url: http://localhost:8080/gym-crm-core/api/v1
    description: Local development server

paths:
  /trainees/register:
    post:
      tags:
        - Trainee
      summary: Register new trainee
      description: Registers a new trainee with basic information and generates username/password
      operationId: registerTrainee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeCreateRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreationResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainees/{username}:
    get:
      tags:
        - Trainee
      summary: Get trainee profile
      description: Retrieves detailed information about a trainee including assigned trainers
      operationId: getTraineeProfile
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: Trainee profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeGetResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error
    put:
      tags:
        - Trainee
      summary: Update trainee profile
      description: Updates trainee's personal information and activation status
      operationId: updateTraineeProfile
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeUpdateRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeUpdateResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error
    delete:
      tags:
        - Trainee
      summary: Delete trainee profile
      description: Hard delete trainee profile with cascade deletion of related trainings
      operationId: deleteTraineeProfile
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: Trainee profile deleted successfully
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainees/{username}/change-activation-status:
    patch:
      tags:
        - Authentication
      summary: Change trainee activation status
      description: Activates or deactivates a trainee profile
      operationId: changeTraineeActivationStatus
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationStatusRequest'
      responses:
        '200':
          description: Activation status updated successfully
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainees/{username}/available-trainers:
    get:
      tags:
        - Assignment
      summary: Get available trainers
      description: Retrieves list of active trainers not yet assigned to the trainee
      operationId: getAvailableTrainers
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: List of available trainers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailableTrainerGetResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainees/{username}/trainers:
    put:
      tags:
        - Assignment
      summary: Update trainee's trainer list
      description: Updates the list of trainers assigned to a trainee
      operationId: updateTraineeTrainers
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraineeAssignedTrainersUpdateRequest'
      responses:
        '200':
          description: Trainers list updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraineeAssignedTrainersUpdateResponse'
        '400':
          description: Invalid input data or trainer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainees/{username}/trainings:
    get:
      tags:
        - Training
      summary: Get trainee's training schedule
      description: Retrieves trainee's training schedule with optional filtering
      operationId: getTraineeTrainings
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/TrainerName'
        - $ref: '#/components/parameters/TrainingType'
      responses:
        '200':
          description: List of trainings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TraineeTrainingGetResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainers/register:
    post:
      tags:
        - Trainer
      summary: Register new trainer
      description: Registers a new trainer with basic information and generates username/password
      operationId: registerTrainer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainerCreateRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreationResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trainers/{username}:
    get:
      tags:
        - Trainer
      summary: Get trainer profile
      description: Retrieves detailed information about a trainer including assigned trainees
      operationId: getTrainerProfile
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: Trainer profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerGetResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error
    put:
      tags:
        - Trainer
      summary: Update trainer profile
      description: Updates trainer's personal information and activation status
      operationId: updateTrainerProfile
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainerUpdateRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainerUpdateResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainers/{username}/change-activation-status:
    patch:
      tags:
        - Authentication
      summary: Change trainer activation status
      description: Activates or deactivates a trainer profile
      operationId: changeTrainerActivationStatus
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationStatusRequest'
      responses:
        '200':
          description: Activation status updated successfully
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /trainers/{username}/trainings:
    get:
      tags:
        - Training
      summary: Get trainer's training schedule
      description: Retrieves trainer's training schedule with optional filtering
      operationId: getTrainerTrainings
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/TraineeName'
      responses:
        '200':
          description: List of trainings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainerTrainingGetResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticates a user (trainee or trainer) with username and password and returns JWT access token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, returns JWT access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /change-password:
    put:
      tags:
        - Authentication
      summary: Change user password
      description: Changes the password for a trainee or trainer
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access or invalid old password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Generates a new JWT access token using a valid refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid or missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error
      security:
        - refreshToken: [ ]

  /logout:
    post:
      tags:
        - Authentication
      summary: Log out user
      description: Invalidates the refresh token and logs out the user
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Successfully logged out
        '400':
          description: Invalid or missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access or invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error
      security:
        - refreshToken: [ ]

  /trainings:
    post:
      tags:
        - Training
      summary: Add new training
      description: Creates a new training session for a trainee and trainer
      operationId: addTraining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingCreateRequest'
      responses:
        '200':
          description: Training created successfully
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trainee or trainer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

  /training-types:
    get:
      tags:
        - Training
      summary: Get training types
      description: Retrieves the list of available training types
      operationId: getTrainingTypes
      responses:
        '200':
          description: List of training types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainingTypeResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Unexpected error

components:
  parameters:
    Username:
      name: username
      in: path
      description: The username of the trainee or trainer
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
        example: "billy.herrington"
    FromDate:
      name: fromDate
      in: query
      description: "Filter trainings from this date (format: yyyy-MM-dd)"
      required: false
      schema:
        type: string
        format: date
        example: "2025-07-14"
    ToDate:
      name: toDate
      in: query
      description: "Filter trainings to this date (format: yyyy-MM-dd)"
      required: false
      schema:
        type: string
        format: date
        example: "2025-07-31"
    TrainerName:
      name: trainerName
      in: query
      description: Filter by trainer's first name
      required: false
      schema:
        type: string
        example: "Eren"
    TraineeName:
      name: traineeName
      in: query
      description: Filter by trainee's first name
      required: false
      schema:
        type: string
        example: "Billy"
    TrainingType:
      name: trainingType
      in: query
      description: Filter by training type name
      required: false
      schema:
        type: string
        example: "Cardio"

  schemas:
    User:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
          description: First name
          maxLength: 50
          example: "Billy"
        lastName:
          type: string
          description: Last name
          maxLength: 50
          example: "Herrington"
    Profile:
      type: object
      required:
        - username
        - isActive
      properties:
        username:
          type: string
          description: User's username
          pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: "billy.herrington"
        isActive:
          type: boolean
          description: Indicates if the user is active
          example: true
    TrainingTypeRef:
      type: object
      required:
        - specialization
      properties:
        specialization:
          type: string
          description: Trainer's specialization (training type)
          example: "Yoga"
    AssignedUser:
      type: object
      required:
        - username
        - firstName
        - lastName
      properties:
        username:
          type: string
          description: User's username
          pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: "billy.herrington"
        firstName:
          type: string
          description: User's first name
          maxLength: 50
          example: "Billy"
        lastName:
          type: string
          description: User's last name
          maxLength: 50
          example: "Herrington"
    Trainee:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            dateOfBirth:
              type: string
              format: date
              description: "Date of birth (format: yyyy-MM-dd)"
              example: "2000-03-22"
            address:
              type: string
              description: Contact address
              maxLength: 200
              example: "123 Main St"
    TraineeCreateRequest:
      allOf:
        - $ref: '#/components/schemas/Trainee'
    UserCreationResponse:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Generated unique username
          example: "billy.herrington"
        password:
          type: string
          description: Generated secure password
          example: "secure-password"
    TraineeGetResponse:
      allOf:
        - $ref: '#/components/schemas/Trainee'
        - $ref: '#/components/schemas/Profile'
        - type: object
          properties:
            trainers:
              type: array
              description: List of assigned trainers
              items:
                allOf:
                  - $ref: '#/components/schemas/AssignedUser'
                  - $ref: '#/components/schemas/TrainingTypeRef'
              example:
                - username: "ricardo.milos"
                  firstName: "Ricardo"
                  lastName: "Milos"
                  specialization: "Yoga"
                - username: "eren.yeager"
                  firstName: "Eren"
                  lastName: "Yeager"
                  specialization: "Cardio"
    TraineeUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/Trainee'
        - type: object
          required:
            - isActive
          properties:
            isActive:
              type: boolean
              description: Indicates if the trainee is active
              example: false
      example:
        firstName: "Jason"
        lastName: "Statham"
        dateOfBirth: "1967-07-26"
        address: "456 Action Ave, London"
        isActive: false
    TraineeUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/Trainee'
        - $ref: '#/components/schemas/Profile'
        - type: object
          properties:
            trainers:
              type: array
              description: List of assigned trainers
              items:
                allOf:
                  - $ref: '#/components/schemas/AssignedUser'
                  - $ref: '#/components/schemas/TrainingTypeRef'
              example:
                - username: "ricardo.milos"
                  firstName: "Ricardo"
                  lastName: "Milos"
                  specialization: "Yoga"
                - username: "eren.yeager"
                  firstName: "Eren"
                  lastName: "Yeager"
                  specialization: "Cardio"
    Trainer:
      allOf:
        - $ref: '#/components/schemas/User'
        - $ref: '#/components/schemas/TrainingTypeRef'
    TrainerCreateRequest:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required:
            - specialization
          properties:
            specialization:
              type: string
              description: Trainer's specialization (training type)
              example: "Yoga"
    TrainerGetResponse:
      allOf:
        - $ref: '#/components/schemas/Trainer'
        - $ref: '#/components/schemas/Profile'
        - type: object
          properties:
            trainees:
              type: array
              description: List of assigned trainees
              items:
                $ref: '#/components/schemas/AssignedUser'
              example:
                - username: "billy.herrington"
                  firstName: "Billy"
                  lastName: "Herrington"
                - username: "jason.statham"
                  firstName: "Jason"
                  lastName: "Statham"
    TrainerUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required:
            - isActive
          properties:
            isActive:
              type: boolean
              description: Indicates if the trainer is active
              example: true
            specialization:
              type: string
              description: Trainer's specialization (training type)
              readOnly: true
              example: "Yoga"
      example:
        firstName: "Ricardo"
        lastName: "Milos"
        isActive: true
        specialization: "Yoga"
    TrainerUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/Trainer'
        - $ref: '#/components/schemas/Profile'
        - type: object
          properties:
            trainees:
              type: array
              description: List of assigned trainees
              items:
                $ref: '#/components/schemas/AssignedUser'
              example:
                - username: "billy.herrington"
                  firstName: "Billy"
                  lastName: "Herrington"
                - username: "jason.statham"
                  firstName: "Jason"
                  lastName: "Statham"
    ActivationStatusRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean
          description: New activation status
          example: true
    TraineeAssignedTrainersUpdateRequest:
      type: object
      required:
        - trainerUsernames
      properties:
        trainerUsernames:
          type: array
          description: List of trainer usernames to assign
          items:
            type: string
            pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: [ "ricardo.milos", "eren.yeager" ]
          minItems: 1
    TraineeAssignedTrainersUpdateResponse:
      type: object
      description: List wrapper of updated trainers
      properties:
        trainers:
          type: array
          items:
            type: object
            allOf:
              - $ref: '#/components/schemas/AssignedUser'
              - $ref: '#/components/schemas/TrainingTypeRef'
          example:
            - username: "ricardo.milos"
              firstName: "Ricardo"
              lastName: "Milos"
              specialization: "Yoga"
            - username: "eren.yeager"
              firstName: "Eren"
              lastName: "Yeager"
              specialization: "Cardio"
    AvailableTrainerGetResponse:
      allOf:
        - $ref: '#/components/schemas/Trainer'
        - $ref: '#/components/schemas/Profile'
    TrainingBase:
      type: object
      required:
        - trainingName
        - trainingDate
        - trainingType
        - trainingDuration
      properties:
        trainingName:
          type: string
          description: Name of the training session
          example: "Strength Training"
        trainingDate:
          type: string
          format: date
          description: Date of the training session
          example: "2025-07-01"
        trainingType:
          type: string
          description: Type of training
          example: "Cardio"
        trainingDuration:
          type: integer
          description: Duration of training in minutes
          minimum: 1
          example: 60
    TraineeTrainingGetResponse:
      allOf:
        - $ref: '#/components/schemas/TrainingBase'
        - type: object
          required:
            - trainerName
          properties:
            trainerName:
              type: string
              description: Name of the trainer
              example: "Eren"
    TrainerTrainingGetResponse:
      allOf:
        - $ref: '#/components/schemas/TrainingBase'
        - type: object
          required:
            - traineeName
          properties:
            traineeName:
              type: string
              description: Name of the trainee
              example: "Billy"
    TrainingCreateRequest:
      type: object
      required:
        - traineeUsername
        - trainerUsername
        - trainingName
        - trainingDate
        - trainingDuration
        - trainingTypeName
      properties:
        traineeUsername:
          type: string
          description: Username of the trainee
          pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: "billy.herrington"
        trainerUsername:
          type: string
          description: Username of the trainer
          pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: "ricardo.milos"
        trainingName:
          type: string
          description: Name of the training session
          example: "Strength Training"
        trainingDate:
          type: string
          format: date
          description: Date of the training session
          example: "2025-07-01"
        trainingDuration:
          type: integer
          description: Duration of training in minutes
          minimum: 1
          example: 60
        trainingTypeName:
          type: string
          description: Training specialization (training type)
          example: "Yoga"
    TrainingTypeResponse:
      type: object
      required:
        - trainingType
        - trainingTypeId
      properties:
        trainingType:
          type: string
          description: Name of the training type
          example: "Cardio"
        trainingTypeId:
          type: integer
          description: ID of the training type
          example: 1
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username of the trainee or trainer
          pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: "billy.herrington"
        password:
          type: string
          description: Password of the user
          example: "secure-password"
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      required:
        - success
        - accessToken
        - refreshToken
    ChangePasswordRequest:
      type: object
      required:
        - username
        - oldPassword
        - newPassword
      properties:
        username:
          type: string
          description: Username of the trainee or trainer
          pattern: '^[a-zA-Z]+\.[a-zA-Z]+(\d+)?$'
          example: "billy.herrington"
        oldPassword:
          type: string
          description: Current password
          example: "old-secure-password"
        newPassword:
          type: string
          description: New password
          example: "new-secure-password"
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Refresh token issued during login
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Refresh token to be invalidated
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorMessage
      properties:
        errorCode:
          type: integer
          description: Unique identifier for the error type
          example: 2760
        errorMessage:
          type: string
          description: Human-readable description of the error
          example: "An error occurred while processing the request: error message"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token for authentication
    refreshToken:
      type: apiKey
      in: header
      name: X-Refresh-Token
      description: Refresh token for generating new access tokens

security:
  - bearerAuth: [ ]
  - refreshToken: [ ]