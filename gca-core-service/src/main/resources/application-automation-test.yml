spring:
  datasource:
    url: jdbc:h2:mem:gym_test_db;DB_CLOSE_DELAY=-1
    username: sa
    driver-class-name: org.h2.Driver

  activemq:
    broker-url: vm://embedded?broker.persistent=false

eureka:
  client:
    enabled: false

workload:
  queue:
    name: trainer.workload.queue

jms:
  request-timeout-ms: 5000

jwt:
  secret: ${JWT_TEST_SECRET}
  expiration: 900000
  refresh-expiration: 604800000

refresh-token:
  cleanup:
    every-milliseconds: 3600000

bruteforce:
  max-attempts: 3
  max-size: 10000
  expire-minutes: 5