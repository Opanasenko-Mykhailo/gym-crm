server:
  port: 8080

app:
  api:
    base-path: /gym-crm-core/api/v1
  swagger:
    file-name: gym.yml

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db
    username: gcs
    password: gcs
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

jwt:
  secret: gym-crm-secret-key-1234567890XXABCD
  expiration: 900000
  refresh-expiration: 604800000

refresh-token:
  cleanup:
    every-milliseconds: 3600000

bruteforce:
  max-attempts: 3
  max-size: 10000
  expire-minutes: 5

cors:
  allowed-origins: "*"

logging:
  level:
    org.springframework: INFO
    com.gcs.app: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always