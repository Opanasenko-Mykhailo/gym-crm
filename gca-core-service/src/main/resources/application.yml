server:
  port: 8081

app:
  api:
    base-path: /gym-crm-core/api/v1
  swagger:
    file-name: gym.yml

spring:
  config:
    import: optional:file:./gca-core-service/.env[.properties]
  application:
    name: gca-core-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/gym_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  activemq:
    broker-url: tcp://${ACTIVEMQ_HOST}:${ACTIVEMQ_PORT}
    user: ${ACTIVEMQ_USER}
    password: ${ACTIVEMQ_PASSWORD}
    pool:
      enabled: false

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
  refresh-expiration: 604800000

refresh-token:
  cleanup:
    every-milliseconds: 3600000

bruteforce:
  max-attempts: 3
  max-size: 10000
  expire-minutes: 5

cors:
  allowed-origins: "*"

logging:
  level:
    org.springframework: INFO
    com.gcs.app: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:8761/eureka/

workload:
  service:
    base-url: http://workload-service
  queue:
    name: trainer.workload.queue

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 2
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 60s
    instances:
      workload-service:
        baseConfig: default

jms:
  request-timeout-ms: 5000