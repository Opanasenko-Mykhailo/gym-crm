app:
  api:
    base-path: /gym-crm-core/api/v1
  swagger:
    file-name: gym.yml

database:
  url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;
  driver-class-name: org.h2.Driver
  username: sa

hibernate:
  dialect: org.hibernate.dialect.H2Dialect
  hbm2ddl-auto: none
  show_sql: true
  format_sql: true

spring:
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
    drop-first: true

bruteforce:
  max-attempts: 3
  max-size: 10000
  expire-minutes: 5

cors:
  allowed-origins: "*"

jwt:
  secret: gym-crm-testing-key-1234567890XXABCD
  expiration: 86400000
  refresh-expiration: 604800000

workload:
  service:
    base-url: http://workload-service
  queue:
    name: trainer.workload.queue