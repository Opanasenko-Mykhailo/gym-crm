spring:
  config:
    import: optional:file:./workload-service/.env[.properties]
  application:
    name: workload-service
  datasource:
    url: jdbc:h2:mem:workloaddb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: gym
    password: gym
  h2:
    console:
      enabled: true
  activemq:
    broker-url: tcp://localhost:61616
    user: gca
    password: gca
    pool:
      enabled: false

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jms:
  request-timeout-ms: 5000