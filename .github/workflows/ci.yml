name: CI - Build, Test and SonarCloud

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [workload-service, gym-crm-service]
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils jq

      - name: Extract sonar.projectKey from pom.xml
        id: extract-key
        run: |
          cd ${{ matrix.service }}
          PROJECT_KEY=$(xmllint --xpath "string(//*[local-name()='project']/*[local-name()='properties']/*[local-name()='sonar.projectKey'])" pom.xml)
          if [ -z "$PROJECT_KEY" ]; then
            echo "Error: sonar.projectKey not found in pom.xml"
            exit 1
          fi
          echo "PROJECT_KEY=$PROJECT_KEY" >> $GITHUB_ENV

      - name: Build, test and generate Jacoco report
        run: |
          cd ${{ matrix.service }}
          mvn clean verify -Djacoco.skip=false

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: ${{ env.PROJECT_KEY }}
        run: |
          cd ${{ matrix.service }}
          mvn sonar:sonar \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.projectKey=$PROJECT_KEY \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.exclusions=**/mapper/**,**/constant/**,**/dto/**,**/model/**,**/config/**

      - name: Wait for SonarCloud analysis to finish
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: ${{ env.PROJECT_KEY }}
        run: |
          TASK_ID=$(curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/ce/component?component=${PROJECT_KEY}" | jq -r '.queue[0].id // .current.id')
          STATUS="IN_PROGRESS"
          ATTEMPTS=0
          while [ "$STATUS" = "IN_PROGRESS" ] && [ $ATTEMPTS -lt 60 ]; do
            sleep 10
            STATUS=$(curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/ce/task?id=${TASK_ID}" | jq -r '.task.status')
            echo "Current status: $STATUS"
            ATTEMPTS=$((ATTEMPTS+1))
          done
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "SonarCloud analysis failed or timed out."
            exit 1
          fi

      - name: Check Quality Gate and issues
        id: check-sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: ${{ env.PROJECT_KEY }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          if [ -n "${PULL_REQUEST_NUMBER}" ]; then
            QG_STATUS=$(curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT_KEY}&pullRequest=${PULL_REQUEST_NUMBER}" | jq -r '.projectStatus.status')
            curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/issues/search?componentKeys=${PROJECT_KEY}&severities=BLOCKER,CRITICAL,MAJOR&resolved=false&pullRequest=${PULL_REQUEST_NUMBER}" > sonar_issues.json
            curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/hotspots/search?projectKey=${PROJECT_KEY}&pullRequest=${PULL_REQUEST_NUMBER}&status=TO_REVIEW&ps=500" > sonar_security_hotspots.json
          else
            QG_STATUS=$(curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" | jq -r '.projectStatus.status')
            curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/issues/search?componentKeys=${PROJECT_KEY}&severities=BLOCKER,CRITICAL,MAJOR&resolved=false" > sonar_issues.json
            curl -s -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/hotspots/search?projectKey=${PROJECT_KEY}&status=TO_REVIEW&ps=500" > sonar_security_hotspots.json
          fi
          echo "quality_gate_status=$QG_STATUS" >> $GITHUB_OUTPUT
          ISSUES_COUNT=$(jq '.total' sonar_issues.json)
          echo "issues_count=$ISSUES_COUNT" >> $GITHUB_OUTPUT

      - name: Post SonarCloud summary to PR
        if: github.event_name == 'pull_request' && steps.check-sonar.outputs.issues_count != ''
        uses: actions/github-script@v6
        env:
          PROJECT_KEY: ${{ env.PROJECT_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const issues = JSON.parse(fs.readFileSync('sonar_issues.json', 'utf8')).issues || [];
            const totalIssues = parseInt('${{ steps.check-sonar.outputs.issues_count }}', 10);
            const hotspots = JSON.parse(fs.readFileSync('sonar_security_hotspots.json', 'utf8')).hotspots || [];
            const totalHotspots = hotspots.length;
            let commentBody = totalIssues > 0
              ? `## SonarCloud Issues Report\nFound **${totalIssues}** Blocker/Critical/Major issues.\n`
              : '## SonarCloud Issues Report\n🎉 No Blocker/Critical/Major issues found.';
            if (totalHotspots > 0) {
              commentBody += `\n\n## Security Hotspots Detected\nFound **${totalHotspots}** hotspots.\n`;
            }
            commentBody += `[View project in SonarCloud](https://sonarcloud.io/project/issues?id=${process.env.PROJECT_KEY}).`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes('SonarCloud Issues Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: commentBody });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: commentBody });
            }

      - name: Fail workflow if Quality Gate failed or issues found
        run: |
          echo "Quality Gate status: ${{ steps.check-sonar.outputs.quality_gate_status }}"
          echo "Issues count: ${{ steps.check-sonar.outputs.issues_count }}"
          if [[ "${{ steps.check-sonar.outputs.quality_gate_status }}" != "OK" ]] || [[ "${{ steps.check-sonar.outputs.issues_count }}" != "0" ]]; then
            echo "SonarCloud Quality Gate failed or issues found. Failing workflow."
            exit 1
          fi