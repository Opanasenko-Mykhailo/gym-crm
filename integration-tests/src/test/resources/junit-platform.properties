cucumber.features=src/test/resources/features
cucumber.glue=com.gcm.steps,com.gcm.config
cucumber.plugin=pretty,html:target/cucumber-reports.html,json:target/cucumber.json,summary
cucumber.execution.parallel.enabled=false
cucumber.execution.order=lexical
cucumber.filter.tags=@PositiveCase or @NegativeCase
cucumber.junit-platform.naming-strategy=long