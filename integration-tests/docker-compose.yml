services:
  activemq:
    image: apache/activemq-classic:latest
    ports:
      - "61616:61616"

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: test_user
      MONGO_INITDB_ROOT_PASSWORD: test_password
      MONGO_INITDB_DATABASE: workloaddb

  gca-core-service:
    ports:
      - "8081:8081"
    build:
      context: ..
      dockerfile: gca-core-service/Dockerfile.automation-test
    depends_on:
      - activemq
    environment:
      JWT_TEST_SECRET: test-secret-key-for-integration-tests

  workload-service:
    ports:
      - "8082:8082"
    build:
      context: ..
      dockerfile: workload-service/Dockerfile.automation-test
    depends_on:
      - activemq
      - mongodb
    environment:
      TEST_MONGODB_URI: "mongodb://test_user:test_password@mongodb:27017/workloaddb?authSource=admin"
      JWT_TEST_SECRET: test-secret-key-for-integration-tests